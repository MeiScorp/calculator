<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calc-input"> 
            <p id="user-input">0</p>
        </div>
        <div class="buttons">
            <button type="button" onclick="clearAll('')" class="other-operations">AC</button>
            <button type="button" onclick="clearLast('')" class="other-operations">x</button>
            <button type="button" onclick="typingValue('%')" class="other-operations">%</button>
            <button type="button" onclick="typingValue('/')" class="classic-operations">/</button>
            <button type="button" onclick="typingValue('7')" class="number">7</button>
            <button type="button" onclick="typingValue('8')" class="number">8</button>
            <button type="button" onclick="typingValue('9')" class="number">9</button>
            <button type="button" onclick="typingValue('*')" class="classic-operations">*</button>
            <button type="button" onclick="typingValue('4')" class="number">4</button>
            <button type="button" onclick="typingValue('5')" class="number">5</button>
            <button type="button" onclick="typingValue('6')" class="number">6</button>
            <button type="button" onclick="typingValue('-')" class="classic-operations">-</button>
            <button type="button" onclick="typingValue('1')" class="number">1</button>
            <button type="button" onclick="typingValue('2')" class="number">2</button>
            <button type="button" onclick="typingValue('3')" class="number">3</button>
            <button type="button" onclick="typingValue('+')" class="classic-operations">+</button>
            <button type="button" class="change-mode">@</button>
            <button type="button" onclick="typingValue('0')" class="number">0</button>
            <button type="button" onclick="typingValue('.')" class="other-operations">.</button>
            <button type="button" onclick="calcValue('')" class="classic-operations">=</button>
        </div>
    </div>

    



    

    <script src="index.js"></script>
</body>
</html>
